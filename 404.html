<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sayfa bulunamadi | Dexi Room</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    >
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, system-ui, sans-serif;
        background: #f4f7fb;
        color: #172032;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        max-width: 420px;
        background: #fff;
        border: 1px solid #dfe6f5;
        border-radius: 16px;
        padding: 28px;
        box-shadow: 0 18px 50px rgb(21 51 114 / 0.08);
        text-align: center;
      }
      .mark {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 48px;
        height: 48px;
        border-radius: 14px;
        background: linear-gradient(135deg, #3b73ff, #2d5ae6);
        color: #fff;
        font-weight: 700;
        margin-bottom: 16px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 1.25rem;
      }
      p {
        margin: 0 0 22px;
        color: #4c5870;
        line-height: 1.5;
        font-size: 0.95rem;
      }
      a {
        display: inline-block;
        padding: 10px 20px;
        border-radius: 999px;
        background: #1f3fbf;
        color: #fff;
        text-decoration: none;
        font-weight: 600;
        font-size: 0.9rem;
      }
      a:hover {
        opacity: 0.92;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="mark" aria-hidden="true">DR</div>
      <h1>Sayfa bulunamadi</h1>
      <p>Bu adres gecersiz veya tasindi. Ana sayfaya donerek QR magaza planlayiciyi kullanabilirsiniz.</p>
      <a href="index.html">Ana sayfaya git</a>
    </div>
  </body>
</html>
